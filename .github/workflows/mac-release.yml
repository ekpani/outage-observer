name: Release Mac

# Builds, Developer-ID-signs, and notarizes the Mac app, packages a branded DMG,
# and publishes it as a GitHub Release (DIRECT download). Reuses the SAME recipe
# you run locally: `fastlane mac release`. CI-specific work is staging the
# signing identity + the App Store Connect API key from repo secrets.
#
# Manual-trigger only — you decide when a build ships. Version = MARKETING_VERSION
# in mac/project.yml; build number = a UTC timestamp (fastlane).
#
# SETUP — six repo secrets (Settings → Secrets and variables → Actions). The
# first five are reusable from your other apps' Developer ID setup:
#   DEVID_CERT_P12_BASE64  base64 of your exported "Developer ID Application" .p12
#   DEVID_CERT_PASSWORD    the password you set when exporting that .p12
#   ASC_KEY_ID             App Store Connect API key id
#   ASC_ISSUER_ID          App Store Connect issuer id (uuid)
#   ASC_KEY_P8_BASE64      base64 of the AuthKey_*.p8 file
#   SPARKLE_ED_PRIVATE_KEY the EdDSA private key that signs the auto-update feed
# (Outage Observer needs NO provisioning profile — Developer ID + notarized,
# NOT sandboxed, so Sparkle can self-update.)

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark the GitHub Release as a pre-release (beta)"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-mac
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    defaults:
      run:
        working-directory: mac
    steps:
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen; brew list create-dmg >/dev/null 2>&1 || brew install create-dmg

      # Import the Developer ID Application identity into a throwaway keychain so
      # codesign can use it non-interactively, then drop the .p12 from disk.
      - name: Stage signing identity
        env:
          CERT_P12_BASE64: ${{ secrets.DEVID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KPW="$(openssl rand -base64 24)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"

      # The fastlane lane reads the ASC API key from these env vars (asc_key).
      - name: Stage App Store Connect API key
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/keys"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$HOME/keys/asc.p8"
          {
            echo "ASC_KEY_PATH=$HOME/keys/asc.p8"
            echo "ASC_KEY_ID=${{ secrets.ASC_KEY_ID }}"
            echo "ASC_ISSUER_ID=${{ secrets.ASC_ISSUER_ID }}"
          } >> "$GITHUB_ENV"

      # Same command you run locally: xcodegen (before_all) → build_mac_app
      # (developer-id, automatic signing via the API key) → notarize → staple.
      - name: Build, sign, notarize
        run: fastlane mac release

      - name: Build + notarize the DMG
        id: pkg
        run: |
          set -euo pipefail
          PLIST="build/mac/Outage Observer.app/Contents/Info.plist"
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PLIST")"
          BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$PLIST")"
          ./scripts/make-dmg.sh "build/mac/Outage Observer.app" "Outage-Observer.dmg"
          # Notarize the DMG container too (the app inside is already notarized +
          # stapled) so the download itself is Gatekeeper-clean, then staple it.
          xcrun notarytool submit "Outage-Observer.dmg" \
            --key "$ASC_KEY_PATH" --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER_ID" --wait
          xcrun stapler staple "Outage-Observer.dmg"
          xcrun stapler validate "Outage-Observer.dmg"
          { echo "version=$VERSION"; echo "build=$BUILD"; } >> "$GITHUB_OUTPUT"

      # Generate the signed Sparkle appcast from the FINAL notarized + stapled DMG
      # (so the EdDSA signature covers the exact bytes users download). The feed
      # is hosted on the rolling mac-latest release; outage.observer/appcast.xml
      # redirects there. SPARKLE_ED_PRIVATE_KEY is the EdDSA key (repo secret),
      # fed via stdin so it never lands on disk.
      - name: Generate signed appcast
        env:
          GH_TOKEN: ${{ github.token }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/sparkle-dl" "$RUNNER_TEMP/sparkle-tools"
          # PIN the Sparkle tools to an exact version + verify its checksum. This
          # binary runs with the EdDSA private signing key on its stdin, so it must
          # not be "whatever latest happens to be" (supply-chain) — and an exact
          # filename avoids any multi-asset glob ambiguity.
          SPARKLE_VERSION="2.9.3"
          SPARKLE_SHA256="74a07da821f92b79310009954c0e15f350173374a3abe39095b4fc5096916be6"
          TARBALL="$RUNNER_TEMP/sparkle-dl/Sparkle-${SPARKLE_VERSION}.tar.xz"
          gh release download "$SPARKLE_VERSION" --repo sparkle-project/Sparkle \
            --pattern "Sparkle-${SPARKLE_VERSION}.tar.xz" --output "$TARBALL"
          echo "${SPARKLE_SHA256}  ${TARBALL}" | shasum -a 256 -c -
          tar -xJf "$TARBALL" -C "$RUNNER_TEMP/sparkle-tools"
          GA="$RUNNER_TEMP/sparkle-tools/bin/generate_appcast"
          STAGE="$RUNNER_TEMP/appcast-stage"
          mkdir -p "$STAGE"
          cp "Outage-Observer.dmg" "$STAGE/"
          # Release notes for THIS version: generate_appcast embeds the file whose
          # basename matches the archive (Outage-Observer.dmg -> Outage-Observer.md)
          # as the item's <description>, shown in the Sparkle update dialog.
          if [ -f "RELEASE_NOTES.md" ]; then cp "RELEASE_NOTES.md" "$STAGE/Outage-Observer.md"; fi
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$GA" \
            --ed-key-file - \
            --embed-release-notes \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/mac-latest/" \
            --link "https://outage.observer/mac" \
            "$STAGE"
          cp "$STAGE/appcast.xml" appcast.xml
          # Confirm an item was signed without dumping the whole feed into the log
          # (this step has the private key in its env; keep its output minimal).
          grep -q "sparkle:edSignature" appcast.xml && echo "appcast signed OK ($(grep -c '<item>' appcast.xml) item)"

      - name: Publish GitHub Release + deploy to mac-latest
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          VERSION="${{ steps.pkg.outputs.version }}"
          BUILD="${{ steps.pkg.outputs.build }}"
          TAG="mac-v${VERSION}-${BUILD}"
          # Empty-string flags (NOT bash arrays) so set -u is safe on old bash.
          PRE=""; LATEST="--latest"
          if [ "$PRERELEASE" = "true" ]; then PRE="--prerelease"; LATEST=""; fi
          # 1) Immutable dated release: the history entry AND the repo's "Latest"
          #    badge with TODAY's date (unless this is a prerelease). The dated
          #    release carries the fresh date so mac-latest doesn't need to.
          gh release create "$TAG" "Outage-Observer.dmg" --repo "$REPO" $PRE $LATEST \
            --title "Outage Observer for Mac ${VERSION} (${BUILD})" \
            --notes "Notarized Developer ID build. Open the DMG and drag Outage Observer to Applications."
          # 2) mac-latest: the FIXED rolling download + appcast URL
          #    (outage.observer/mac and /appcast.xml resolve to its assets).
          #    CLOBBER assets in place — never delete→recreate: a failure between a
          #    delete and a recreate would 404 the live download AND break every
          #    installed app's update feed. It's a stable pointer, not the dated
          #    "Latest" entry, so its own publish date doesn't matter.
          gh release view mac-latest --repo "$REPO" >/dev/null 2>&1 || \
            gh release create mac-latest --repo "$REPO" --target "$GITHUB_SHA" \
              --title "Outage Observer for Mac" \
              --notes "The current Outage Observer for Mac build — notarized Developer ID, direct download."
          gh release upload mac-latest "Outage-Observer.dmg" "appcast.xml" --repo "$REPO" --clobber
