name: Mac app release

on:
  push:
    tags: ["mac-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        working-directory: mac
        run: xcodegen generate

      - name: Build (Release, unsigned)
        working-directory: mac
        run: |
          xcodebuild -project OutageObserver.xcodeproj -scheme OutageObserver \
            -configuration Release -derivedDataPath .build \
            CODE_SIGNING_ALLOWED=NO build

      - name: Package
        working-directory: mac
        run: |
          APP=".build/Build/Products/Release/Outage Observer.app"
          ditto -c -k --keepParent "$APP" "Outage-Observer-macos.zip"

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mac/Outage-Observer-macos.zip
          body: |
            Outage Observer for Mac — menu-bar status + notifications.

            Unsigned build: on first launch, right-click the app → **Open** to get
            past Gatekeeper. Requires macOS 13+.
