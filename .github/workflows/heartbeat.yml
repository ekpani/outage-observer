name: Poller heartbeat

# Safety net for the board's freshness. Cloudflare's cron is the primary poller
# (every minute); this is a backup that pings the poll endpoint on a schedule, so
# if the Cloudflare cron ever stalls again the board still refreshes instead of
# silently serving stale statuses. GitHub's scheduled runs can be delayed, so
# this is a backstop, not the primary — the in-page staleness banner is the last
# line of defense. For a tighter 1-minute backup, point an external monitor
# (e.g. cron-job.org) at the same URL.

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub's minimum; may run late)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: heartbeat
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the poller (refreshes priority providers + one shard)
        env:
          # Must equal the Worker's DEBUG_KEY secret — /debug/poll checks
          # env.DEBUG_KEY. (GitHub and Cloudflare secrets can't be auto-linked, so
          # keep the two values in sync; a mismatch silently 404s every run.)
          POLL_KEY: ${{ secrets.POLL_KEY }}
        run: |
          set -euo pipefail
          # Poll twice so two rotating shards advance each run. Pass the key as a
          # header, not a query string, so it doesn't land in request logs.
          #
          # Hit the *.workers.dev origin, not the custom domain: outage.observer
          # has Bot Fight Mode on, which 403s automated requests from datacenter
          # IPs (GitHub runners) before they reach the Worker. workers.dev is a
          # different zone, not behind that toggle, so the backstop keeps working
          # while the public domain stays protected. Same Worker, same /debug/poll.
          for i in 1 2; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" -H "x-debug-key: ${POLL_KEY}" "https://outage-observer.amrith.workers.dev/debug/poll")
            echo "poll $i -> HTTP $code"
            [ "$code" = "200" ] || exit 1
            sleep 5
          done
