<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Outage Observer — live status of your stack</title>
  <!-- Installable PWA (incl. iOS 16.4+ Home Screen, which then supports Web Push). -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Observer" />
  <!-- `black` (not black-translucent): iOS RESERVES the status bar so content
       starts below it on every device, with no dependency on env() safe-area
       insets (which return 0 in standalone PWAs on some iOS versions). A black
       status bar over the near-black #070809 background stays seamless. -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="description" content="A fast, no-login status board for the infra and AI providers in your stack. One page, all your services, live." />
  <meta property="og:title" content="Outage Observer" />
  <meta property="og:description" content="Live status of the infra and AI providers in your stack, in one place." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://outage.observer/" />
  <meta property="og:image" content="https://outage.observer/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Outage Observer — watch your whole stack" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Outage Observer" />
  <meta name="twitter:description" content="Live status of the infra and AI providers in your stack, in one place." />
  <meta name="twitter:image" content="https://outage.observer/og.png" />
  <meta name="theme-color" content="#FBFBFA" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#070809" media="(prefers-color-scheme: dark)" />
  <link rel="canonical" href="https://outage.observer/" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="alternate" type="application/atom+xml" title="Outage Observer status changes" href="/feed.xml" />
  <link rel="preload" href="/fonts/DepartureMono-Regular.woff2" as="font" type="font/woff2" crossorigin />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://outage.observer/#org",
        "name": "Outage Observer",
        "url": "https://outage.observer/",
        "logo": "https://outage.observer/og.png",
        "description": "Live status of the infrastructure and AI providers in your stack, aggregated from their official status pages."
      },
      {
        "@type": "WebSite",
        "@id": "https://outage.observer/#site",
        "name": "Outage Observer",
        "url": "https://outage.observer/",
        "publisher": { "@id": "https://outage.observer/#org" },
        "description": "A fast, no-login status board for the infra and AI providers in your stack. One page, all your services, live.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": { "@type": "EntryPoint", "urlTemplate": "https://outage.observer/status?q={search_term_string}" },
          "query-input": "required name=search_term_string"
        }
      }
    ]
  }
  </script>
  <link rel="stylesheet" href="/tokens.css" />
  <link rel="stylesheet" href="/board.css" />
  <script>
    // Apply a pinned theme before first paint to avoid a flash.
    (function () { try { var t = localStorage.getItem("oo-theme"); if (t) document.documentElement.setAttribute("data-theme", t); } catch (e) {} })();
  </script>
</head>
<body>
  <div class="radar" aria-hidden="true"><div class="radar-sweep"></div></div>
  <main class="wrap">
    <div class="board">
      <header class="board-header">
        <div class="brand">
          <svg class="aperture" viewBox="0 0 64 64" width="24" height="24" fill="none" role="img" aria-label="Outage Observer">
            <circle cx="32" cy="32" r="25" stroke="currentColor" stroke-width="3" />
            <circle cx="32" cy="32" r="14" stroke="currentColor" stroke-width="3" opacity=".4" />
            <line x1="32" y1="3" x2="32" y2="9" stroke="currentColor" stroke-width="3" />
            <line x1="32" y1="55" x2="32" y2="61" stroke="currentColor" stroke-width="3" />
            <line x1="3" y1="32" x2="9" y2="32" stroke="currentColor" stroke-width="3" />
            <line x1="55" y1="32" x2="61" y2="32" stroke="currentColor" stroke-width="3" />
            <circle class="pupil" cx="32" cy="32" r="6" fill="#3FCF5E" />
          </svg>
          <span class="wordmark">outage<span class="dot">.</span>observer</span>
        </div>
        <div class="spacer"></div>
        <input id="filter" class="filter" type="search" placeholder="Search services…" aria-label="Search services" autocomplete="off" />
        <button id="cmdk" class="kbd-hint" aria-label="Open command palette" title="Search & commands (Cmd-K)"><kbd>⌘K</kbd></button>
        <span id="updated" class="updated"></span>
        <button id="theme" class="icon-btn" aria-label="Toggle light/dark theme" title="Toggle theme">
          <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true">
            <circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.5" />
            <path d="M8 2 a6 6 0 0 1 0 12 Z" fill="currentColor" />
          </svg>
        </button>
      </header>
      <div id="board-body"></div>
    </div>
    <section class="notify" id="notify" hidden>
      <button id="notify-close" class="notify-close" aria-label="Dismiss" title="Dismiss">×</button>
      <div class="notify-title">Get alerts when your stack changes</div>
      <div class="notify-sub">For the services you're observing. Pick a channel, or use the <a id="rss-link2" href="/feed.xml">RSS feed</a>.</div>
      <div class="notify-row push-row" id="push-row" hidden>
        <button id="push-toggle" class="btn">🔔 Enable browser alerts</button>
        <span id="push-state" class="notify-hint mono"></span>
      </div>
      <div class="notify-label mono">Slack or Discord</div>
      <div class="notify-row">
        <input id="hook-url" class="hook-input" type="url" inputmode="url" placeholder="Paste a Slack or Discord webhook URL" autocomplete="off" spellcheck="false" />
        <button id="hook-connect" class="btn btn-primary">Connect</button>
      </div>
      <div id="hook-msg" class="notify-msg" role="status"></div>
    </section>
    <footer class="page-foot mono">
      <a href="/about">about</a> · <a href="/mac">mac</a> · <a href="/alerts">alerts</a><br />
      <a href="https://ekpani.com" target="_blank" rel="noopener noreferrer">an ekpani tool</a>
    </footer>
  </main>
  <div id="palette" class="palette" hidden role="dialog" aria-modal="true" aria-label="Command palette">
    <div class="palette-box" role="document">
      <input id="palette-input" class="palette-input" type="text" placeholder="Search services or run a command…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <div id="palette-results" class="palette-results" role="listbox" aria-label="Results"></div>
      <div class="palette-foot mono"><span><kbd>↑</kbd><kbd>↓</kbd> move</span><span><kbd>↵</kbd> open</span><span><kbd>esc</kbd> close</span></div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
