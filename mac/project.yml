name: OutageObserver
options:
  bundleIdPrefix: observer.outage
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  OutageObserver:
    type: application
    platform: macOS
    dependencies:
      - package: Sparkle
    sources:
      - path: Sources
      - path: Resources/DepartureMono-Regular.otf
      - path: Resources/DepartureMono-LICENSE.txt
      - path: Resources/AppIcon.icns
      - path: Resources/oo-recovered.caf
      - path: Resources/oo-alert.caf
    settings:
      base:
        PRODUCT_NAME: "Outage Observer"
        PRODUCT_BUNDLE_IDENTIFIER: observer.outage.mac
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/OutageObserver.entitlements
        CODE_SIGN_STYLE: Automatic
